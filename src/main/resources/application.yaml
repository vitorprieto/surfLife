spring:
  application:
    name: surfLife

  datasource:
    url: jdbc:postgresql://localhost:5432/surflifedb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    com.br.originalTruta.surfLife: DEBUG

app:
  security:
    jwt:
      secret: "surflife-chave-jwt-super-segura-2026"
      expiration-minutes: 120

  swell-alert:
    scheduler:
      fixed-delay-ms: 300000
      initial-delay-ms: 30000

  forecast:
    provider: open-meteo
    open-meteo:
      base-url: "https://marine-api.open-meteo.com"
      timezone: "America/Sao_Paulo"
      cell-selection: "sea"

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true